<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Harita Oyunları | Ana Sayfa</title>
    <style>
        /* CSS Değişkenleri ve Temel Ayarlar */
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-color: #10b981;
            --accent-hover: #059669;
            --border-color: #334155;
            --font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-family);
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header & Navigasyon */
        header {
            background-color: var(--card-bg);
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: bold;
            color: var(--accent-color);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo span {
            color: var(--text-main);
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 20px;
        }

        nav a {
            color: var(--text-main);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s;
        }

        nav a:hover {
            color: var(--accent-color);
        }

        .menu-toggle {
            display: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--text-main);
        }

        /* Sayfa Düzeni (Layout) */
        .layout-wrapper {
            display: flex;
            gap: 20px;
            padding: 2rem 5%;
            max-width: 1600px;
            margin: 0 auto;
            align-items: stretch;
            flex: 1; 
            width: 100%;
        }

        /* Sidebar (Kenar Çubuğu) */
        .sidebar {
            width: 280px;
            background-color: var(--card-bg);
            border-radius: 10px;
            border: 1px solid var(--border-color);
            padding: 1.5rem;
            flex-shrink: 0;
            position: sticky;
            top: 90px;
            height: fit-content;
        }

        .sidebar h3 {
            font-size: 1.2rem;
            margin-bottom: 1rem;
            color: var(--accent-color);
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 0.5rem;
        }

        .sidebar-list {
            list-style: none;
        }

        .sidebar-list li {
            margin-bottom: 0.5rem;
        }

        .sidebar-list a {
            display: block;
            color: var(--text-main);
            text-decoration: none;
            padding: 0.8rem 1rem;
            border-radius: 5px;
            transition: background 0.2s, color 0.2s;
            background-color: var(--bg-color);
            border: 1px solid transparent;
        }

        .sidebar-list a:hover,
        .sidebar-list a.active {
            background-color: var(--border-color);
            border-color: var(--accent-color);
            color: var(--accent-color);
        }

        /* Oyun Alanı */
        .game-area {
            flex-grow: 1;
            background-color: var(--card-bg);
            border-radius: 10px;
            border: 1px solid var(--border-color);
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        .game-header {
            margin-bottom: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .game-header h1 {
            font-size: 1.8rem;
            color: var(--text-main);
        }

        /* Iframe Taşıyıcısı */
        .iframe-container {
            width: 100%;
            flex-grow: 1; 
            background-color: #000; 
            border-radius: 8px;
            border: 2px solid var(--border-color);
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 600px; 
        }

        .iframe-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            z-index: 10;
        }

        /* Footer */
        footer {
            background-color: var(--card-bg);
            text-align: center;
            padding: 2rem;
            border-top: 1px solid var(--border-color);
            color: var(--text-muted);
            margin-top: auto;
        }

        /* Responsive Ayarlar */
        @media (max-width: 992px) {
            .layout-wrapper {
                flex-direction: column-reverse; 
            }
            .sidebar {
                width: 100%;
                position: static;
                margin-top: 20px;
            }
            .iframe-container {
                min-height: 500px; 
            }
        }

        @media (max-width: 768px) {
            .menu-toggle {
                display: block;
            }
            
            nav ul {
                display: none;
                flex-direction: column;
                position: absolute;
                top: 100%;
                left: 0;
                width: 100%;
                background-color: var(--card-bg);
                padding: 1rem;
                border-bottom: 1px solid var(--border-color);
            }

            nav ul.active {
                display: flex;
            }
            
            .iframe-container {
                min-height: 70vh; 
            }
        }
    </style>
</head>
<body>

    <header>
        <a href="#" class="logo">🌍 <span>Harita Oyunları</span></a>
        <div class="menu-toggle" id="mobile-menu">☰</div>
        <nav>
            <ul id="nav-list">
                <li><a href="#">Ana Sayfa</a></li>
            </ul>
        </nav>
    </header>

    <div class="layout-wrapper">
        
        <aside class="sidebar">
            <h3>Diğer Oyunlar</h3>
            <ul class="sidebar-list">
                <li><a href="#" class="active">🎯 Türkiye Haritası Oyunu</a></li>
                <li><a href="#">🗺️ Dünya Başkentleri</a></li>
                <li><a href="#">⚔️ Tarihi İmparatorluklar</a></li>
                <li><a href="#">🏙️ Avrupa Şehirleri</a></li>
                <li><a href="#">🏔️ Coğrafya Testi</a></li>
            </ul>
        </aside>

        <main class="game-area">
            <div class="game-header">
                <h1>Türkiye Haritası Oyunu</h1>
            </div>
            
            <div class="iframe-container">
                <iframe src="/iframe.html" width="100%" height="100%" frameborder="0" allowfullscreen></iframe>
            </div>
        </main>

    </div>

    <footer>
        <p>&copy; 2026 Harita Oyunları. Tüm hakları saklıdır. HTML, CSS ve JS ile özel olarak tasarlanmıştır.</p>
    </footer>

    <script>
        // Mobil Menü İşlemleri
        const mobileMenu = document.getElementById('mobile-menu');
        const navList = document.getElementById('nav-list');

        mobileMenu.addEventListener('click', () => {
            navList.classList.toggle('active');
        });
    </script>
</body>
</html>
