<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Harita Oyunları | Ana Sayfa</title>
    <style>
        /* CSS Değişkenleri ve Temel Ayarlar */
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-color: #10b981;
            --accent-hover: #059669;
            --border-color: #334155;
            --font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-family);
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header & Navigasyon */
        header {
            background-color: var(--card-bg);
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: bold;
            color: var(--accent-color);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo span {
            color: var(--text-main);
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 20px;
        }

        nav a {
            color: var(--text-main);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s;
        }

        nav a:hover {
            color: var(--accent-color);
        }

        .menu-toggle {
            display: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--text-main);
        }

        /* Sayfa Düzeni (Layout) */
        .layout-wrapper {
            display: flex;
            gap: 20px;
            padding: 2rem 5%;
            max-width: 1600px;
            margin: 0 auto;
            align-items: stretch;
            flex: 1; 
            width: 100%;
        }

        /* Sidebar (Kenar Çubuğu) */
        .sidebar {
            width: 280px;
            background-color: var(--card-bg);
            border-radius: 10px;
            border: 1px solid var(--border-color);
            padding: 1.5rem;
            flex-shrink: 0;
            position: sticky;
            top: 90px;
            height: fit-content;
        }

        .sidebar h3 {
            font-size: 1.2rem;
            margin-bottom: 1rem;
            color: var(--accent-color);
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 0.5rem;
        }

        .sidebar-list {
            list-style: none;
        }

        .sidebar-list li {
            margin-bottom: 0.5rem;
        }

        .sidebar-list a {
            display: block;
            color: var(--text-main);
            text-decoration: none;
            padding: 0.8rem 1rem;
            border-radius: 5px;
            transition: background 0.2s, color 0.2s;
            background-color: var(--bg-color);
            border: 1px solid transparent;
        }

        .sidebar-list a:hover,
        .sidebar-list a.active {
            background-color: var(--border-color);
            border-color: var(--accent-color);
            color: var(--accent-color);
        }

        /* Oyun Alanı */
        .game-area {
            flex-grow: 1;
            background-color: var(--card-bg);
            border-radius: 10px;
            border: 1px solid var(--border-color);
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        .game-header {
            margin-bottom: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .game-header h1 {
            font-size: 1.8rem;
            color: var(--text-main);
        }

        /* Iframe Taşıyıcısı */
        .iframe-container {
            width: 100%;
            flex-grow: 1; 
            background-color: transparent; 
            border-radius: 8px;
            border: 2px solid var(--border-color);
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 500px; 
            transition: all 0.3s ease;
        }

        .iframe-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            z-index: 10;
        }

        /* iOS/iPhone İçin Sahte Tam Ekran Modu (Fallback) */
        .iframe-container.css-fullscreen {
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
            width: 100vw !important;
            height: 100vh !important;
            max-width: 100% !important;
            max-height: 100% !important;
            z-index: 99999 !important;
            border-radius: 0 !important;
            border: none !important;
            margin: 0 !important;
        }

        /* CSS Fullscreen Aktifken içindeki özel çıkış butonu */
        .exit-css-fullscreen {
            display: none;
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 999999;
            background-color: rgba(0,0,0,0.7);
            color: white;
            border: 2px solid white;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        .iframe-container.css-fullscreen .exit-css-fullscreen {
            display: block;
        }

        /* Footer */
        footer {
            background-color: var(--card-bg);
            text-align: center;
            padding: 2rem;
            border-top: 1px solid var(--border-color);
            color: var(--text-muted);
            margin-top: auto;
        }

        /* Responsive Ayarlar */
        @media (max-width: 992px) {
            .layout-wrapper {
                flex-direction: column-reverse; 
            }
            .sidebar {
                width: 100%;
                position: static;
                margin-top: 20px;
            }
            .game-header {
                flex-direction: column;
                gap: 15px;
                text-align: center;
            }
        }

        @media (max-width: 768px) {
            .menu-toggle {
                display: block;
            }
            
            nav ul {
                display: none;
                flex-direction: column;
                position: absolute;
                top: 100%;
                left: 0;
                width: 100%;
                background-color: var(--card-bg);
                padding: 1rem;
                border-bottom: 1px solid var(--border-color);
                z-index: 1000;
            }

            nav ul.active {
                display: flex;
            }
            
            .iframe-container {
                min-height: 60vh; 
            }
        }
    </style>
</head>
<body>

    <!-- Header & Navbar -->
    <header>
        <a href="#" class="logo">🌍 <span>Harita Oyunları</span></a>
        <div class="menu-toggle" id="mobile-menu">☰</div>
        <nav>
            <ul id="nav-list">
                <li><a href="./index.html">Ana Sayfa</a></li>
            </ul>
        </nav>
    </header>

    <!-- Ana Düzen: Oyun Alanı ve Sidebar -->
    <div class="layout-wrapper">
        
        <!-- Sidebar: Diğer Oyunlar -->
        <aside class="sidebar">
            <h3>Diğer Oyunlar</h3>
            <ul class="sidebar-list">
                <li><a href="./index.html" class="active">🎯 Türkiye Haritası Oyunu</a></li>
                <li><a href="./game-altin/page-altin.html">Türkiye Altın Yatakları</a></li>
                <li><a href="./game-asbest/page-asbest.html">Türkiye Asbest Yatakları</a></li>
                <li><a href="./game-mermer/page-mermer.html">Türkiye'nin Başlıca Mermer Yatakları</a></li>
            </ul>
        </aside>

        <!-- Sağ Taraf: Oyun Alanı -->
        <main class="game-area">
            <div class="game-header">
                <h1>Türkiye Haritası Oyunu</h1>
                <!-- Dışarıdaki Tam Ekran butonu tamamen kaldırıldı -->
            </div>
            
            <!-- iframe kapsayıcısı -->
            <div class="iframe-container" id="game-container">
                <!-- CSS Tam Ekrandan çıkış için gizli buton (sadece mobilde aktif olur) -->
                <button id="exit-fullscreen-btn" class="exit-css-fullscreen">✖ Çıkış</button>
                
                <!-- Oyun Iframe'i (./ ile bağıl yol kullanıldı) -->
                <iframe src="./türkiye-sehirler.html" width="100%" height="100%" frameborder="0" allow="fullscreen" allowfullscreen id="game-iframe"></iframe>
            </div>
        </main>

    </div>

    <!-- Footer -->
    <footer>
        <p>&copy; 2026 Harita Oyunları. Tüm hakları saklıdır. HTML, CSS ve JS ile özel olarak tasarlanmıştır.</p>
    </footer>

    <script>
        // Mobil Menü İşlemleri
        const mobileMenu = document.getElementById('mobile-menu');
        const navList = document.getElementById('nav-list');

        mobileMenu.addEventListener('click', () => {
            navList.classList.toggle('active');
        });

        // ==========================================
        // İÇERİDEKİ OYUNU DİNLEYİP DIŞARIYI TAM EKRAN YAPMA MANTIĞI
        // (Oyun içi butonları iOS'ta da çalışır hale getirir)
        // ==========================================
        const gameContainer = document.getElementById('game-container');
        const gameIframe = document.getElementById('game-iframe');
        const exitBtn = document.getElementById('exit-fullscreen-btn');

        // Dış Çerçeveyi (Ebeveyni) Tam Ekrana Alma
        function makeParentFullscreen() {
            // Zaten tam ekrandaysa tekrar çalıştırma
            if (document.fullscreenElement || gameContainer.classList.contains('css-fullscreen')) return;

            if (gameContainer.requestFullscreen) {
                // Native API çalıştır (Android/PC)
                gameContainer.requestFullscreen().catch(err => {
                    // Beklenmedik bir engel çıkarsa CSS Fallback'e geç
                    fallbackToCSSFullscreen();
                });
            } else if (gameContainer.webkitRequestFullscreen) {
                gameContainer.webkitRequestFullscreen();
            } else {
                // iPhone/iOS Safari gibi native desteklemeyen cihazlar için CSS Fallback Modu
                fallbackToCSSFullscreen();
            }
        }

        // CSS ile Sahte Tam Ekran Modu (iOS için kilit nokta)
        function fallbackToCSSFullscreen() {
            gameContainer.classList.add('css-fullscreen');
            document.body.style.overflow = 'hidden';
        }

        // Dış Çerçeveyi Tam Ekrandan Çıkarma
        function closeParentFullscreen() {
            gameContainer.classList.remove('css-fullscreen');
            document.body.style.overflow = 'auto';
            if (document.fullscreenElement || document.webkitFullscreenElement) {
                if (document.exitFullscreen) document.exitFullscreen();
                else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
            }
        }

        exitBtn.addEventListener('click', closeParentFullscreen);

        // Native tam ekrandan ESC veya mobil kaydırma ile çıkılırsa temizlik yap
        document.addEventListener('fullscreenchange', () => {
            if (!document.fullscreenElement) closeParentFullscreen();
        });
        document.addEventListener('webkitfullscreenchange', () => {
            if (!document.webkitFullscreenElement) closeParentFullscreen();
        });

        // Oyun yüklendiğinde, uyumluluk modları için mesajlaşma sistemi kur
        window.addEventListener('message', (e) => {
            if (e.data && e.data.type === 'TOGGLE_FULLSCREEN') {
                if (document.fullscreenElement || gameContainer.classList.contains('css-fullscreen')) {
                    closeParentFullscreen();
                } else {
                    makeParentFullscreen();
                }
            }
        });

        gameIframe.addEventListener('load', () => {
            try {
                const innerWin = gameIframe.contentWindow;
                const innerDoc = gameIframe.contentDocument || innerWin.document;

                // Tıklama Avcısı (Sinyal Dinleyici - postMessage ile entegre olmayan çok eski cihazlar için)
                innerDoc.addEventListener('click', (e) => {
                    let targetElement = e.target;
                    let targetStr = '';
                    
                    for (let i = 0; i < 3; i++) {
                        if (!targetElement || targetElement === innerDoc) break;
                        targetStr += (targetElement.className + ' ' + targetElement.id + ' ' + (targetElement.title || '') + ' ' + (targetElement.getAttribute('aria-label') || '')).toLowerCase() + ' ';
                        targetElement = targetElement.parentElement;
                    }

                    const isFullscreenClick = targetStr.includes('fullscreen') || targetStr.includes('full-screen') || targetStr.includes('tam-ekran') || targetStr.includes('maximize') || targetStr.includes('expand');
                    
                    if (isFullscreenClick) {
                        // Sadece ekstra güvenlik (postMessage çalışmazsa)
                        if (document.fullscreenElement || gameContainer.classList.contains('css-fullscreen')) {
                            closeParentFullscreen();
                        } else {
                            makeParentFullscreen();
                        }
                    }
                }, true);

            } catch (e) {
                console.warn("Iframe güvenlik (CORS) engeli. PostMessage fallback kullanılacak.");
            }
        });
    </script>
</body>
</html>
